apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-config
  namespace: backstage
data:
  app-config.yaml: |
    app:
      title: "Internal Developer Platform"
      baseUrl: https://idp.example.com

    backend:
      baseUrl: https://idp.example.com
      listen:
        port: 7007
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}

    techdocs:
      builder: external
      generator:
        runIn: docker
      publisher:
        type: awsS3
        awsS3:
          bucketName: ${TECHDOCS_S3_BUCKET_NAME}
          region: us-east-1

    auth:
      environment: production
      providers:
        github:
          production:
            clientId: ${AUTH_GITHUB_CLIENT_ID}
            clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}

    catalog:
      locations:
        - type: url
          target: https://github.com/my-org/backstage-catalog/blob/main/catalog-info.yaml

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    scaffolder:
      github:
        token: ${GITHUB_TOKEN}
        visibility: public

    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - url: https://kubernetes.default.svc
              name: in-cluster
              authProvider: serviceAccount
              skipTLSVerify: true
              skipMetricsLookup: true

    argocd:
      appLocatorMethods:
        - type: config
          instances:
            - name: argocd
              url: https://argocd.idp.example.com
              username: admin
              password: ${ARGOCD_PASSWORD}

    costInsights:
      engineerCost: 200000
      products:
        aws:
          name: AWS
          icon: aws
        azure:
          name: Azure
          icon: azure
        gcp:
          name: GCP
          icon: gcp