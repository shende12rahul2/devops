apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: project-1-cicd-platform
  description: Multi-cloud CI/CD Platform with GitHub Actions and ArgoCD
  tags:
    - cicd
    - github-actions
    - argocd
    - multi-cloud
  links:
    - url: https://github.com/my-org/project-1-cicd-platform
      title: Source Code
    - url: https://argocd.idp.example.com/applications/project-1
      title: ArgoCD Application
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: my-org/project-1-cicd-platform
